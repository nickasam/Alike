version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: alike-postgres
    environment:
      POSTGRES_DB: alike_db
      POSTGRES_USER: alike_user
      POSTGRES_PASSWORD: alike_password_change_this
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - alike-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alike_user -d alike_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alike-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - alike-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: alike-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_MODE=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=alike_db
      - DB_USER=alike_user
      - DB_PASSWORD=alike_password_change_this
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=change_this_jwt_secret_in_production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alike-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: alike-nginx
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - alike-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  alike-network:
    driver: bridge
