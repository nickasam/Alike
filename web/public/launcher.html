<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alike - 相似灵魂的相遇</title>
    <script>
        // 防止页面刷新时滚动位置记忆
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        
        // 页面加载时强制滚动到顶部
        window.addEventListener('beforeunload', function() {
            window.scrollTo(0, 0);
        });
        
        window.addEventListener('load', function() {
            window.scrollTo(0, 0);
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;
        });
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Material Icons 字体设置 */
        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 漂浮装饰圆圈 */
        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite;
            pointer-events: none;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            top: 20%;
            right: -50px;
            animation-delay: 5s;
        }

        .circle-3 {
            width: 150px;
            height: 150px;
            bottom: 30%;
            left: 10%;
            animation-delay: 10s;
        }

        .circle-4 {
            width: 250px;
            height: 250px;
            bottom: -80px;
            right: -80px;
            animation-delay: 15s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -30px) rotate(90deg); }
            50% { transform: translate(-20px, 20px) rotate(180deg); }
            75% { transform: translate(20px, 30px) rotate(270deg); }
        }

        /* 顶部导航 */
        .navbar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(240, 147, 251, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .nav-logo-icon .material-icons {
            font-size: 26px;
            color: white;
        }

        .nav-logo-text {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .nav-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-btn-login {
            background: rgba(255, 255, 255, 0.95);
            color: #667eea;
        }

        .nav-btn-login:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* Hero区域 */
        .hero-section {
            text-align: center;
            margin-bottom: 80px;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .hero-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 40px rgba(240, 147, 251, 0.5);
            animation: bounce 2s ease-in-out infinite;
            position: relative;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hero-icon .material-icons {
            font-size: 48px;
            color: white;
        }

        .hero-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            filter: blur(30px);
            opacity: 0.6;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        .hero-title {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1.5px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .hero-subtitle {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .hero-description {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }

        /* 功能卡片区域 */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            animation: fadeInUp 1s ease 0.3s;
            animation-fill-mode: both;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease;
            animation-fill-mode: both;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .feature-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .feature-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .feature-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 80px rgba(240, 147, 251, 0.4);
            border-color: rgba(240, 147, 251, 0.5);
        }

        .feature-image {
            width: 100%;
            height: 240px;
            position: relative;
            overflow: hidden;
        }

        .feature-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .feature-card:hover .feature-image img {
            transform: scale(1.1);
        }

        .feature-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.5) 100%);
        }

        .feature-icon-badge {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .feature-card.primary .feature-icon-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .feature-card.secondary .feature-icon-badge {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .feature-icon-badge .material-icons {
            font-size: 36px;
            color: white;
        }

        .feature-content {
            padding: 50px 36px 36px;
            text-align: center;
        }

        .feature-title {
            font-size: 28px;
            font-weight: 900;
            color: #1a1a1a;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .feature-description {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .feature-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #9ca3af;
            font-weight: 600;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .feature-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .feature-card.primary .feature-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .feature-card.secondary .feature-badge {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .feature-badge .material-icons {
            font-size: 16px;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            font-weight: 500;
            animation: fadeIn 1s ease 0.8s;
            animation-fill-mode: both;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 968px) {
            .navbar {
                padding: 12px 24px;
            }

            .nav-logo-text {
                font-size: 20px;
            }

            .nav-btn {
                padding: 10px 20px;
                font-size: 14px;
            }

            .main-content {
                padding: 60px 20px 40px;
            }

            .hero-title {
                font-size: 44px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .hero-icon {
                width: 70px;
                height: 70px;
            }

            .hero-icon .material-icons {
                font-size: 38px;
            }

            .features-grid {
                grid-template-columns: 1fr;
                gap: 32px;
                max-width: 500px;
            }

            .feature-image {
                height: 220px;
            }

            .feature-icon-badge {
                width: 60px;
                height: 60px;
            }

            .feature-icon-badge .material-icons {
                font-size: 30px;
            }

            .feature-content {
                padding: 42px 28px 32px;
            }

            .feature-title {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 10px 16px;
            }

            .nav-logo-text {
                font-size: 18px;
            }

            .nav-btn {
                padding: 8px 16px;
                font-size: 13px;
            }

            .hero-title {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 16px;
            }

            .feature-image {
                height: 200px;
            }

            .feature-content {
                padding: 38px 20px 28px;
            }

            .feature-title {
                font-size: 22px;
            }

            .feature-description {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 漂浮装饰 -->
    <div class="floating-circle circle-1"></div>
    <div class="floating-circle circle-2"></div>
    <div class="floating-circle circle-3"></div>
    <div class="floating-circle circle-4"></div>

    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="nav-logo">
            <div class="nav-logo-icon">
                <span class="material-icons">favorite</span>
            </div>
            <div class="nav-logo-text">Alike</div>
        </div>
        <a href="login.html" class="nav-btn nav-btn-login">登录</a>
    </nav>

    <!-- 主内容 -->
    <div class="main-content">
        <!-- Hero区域 -->
        <div class="hero-section">
            <div class="hero-icon-wrapper">
                <div class="hero-glow"></div>
                <div class="hero-icon">
                    <span class="material-icons">favorite</span>
                </div>
            </div>
            <h1 class="hero-title">相似灵魂的相遇</h1>
            <p class="hero-subtitle">发现志同道合的朋友，开启你的社交之旅</p>
            <p class="hero-description">连接每一个独特的你</p>
        </div>

        <!-- 功能卡片 -->
        <div class="features-grid">
            <!-- 全局聊天室 -->
            <div class="feature-card primary" onclick="location.href='global-chat.html'">
                <div class="feature-image">
                    <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800&h=600&fit=crop" alt="一群男人在讨论聊天">
                    <div class="feature-overlay"></div>
                </div>
                <div class="feature-content">
                    <h3 class="feature-title">全局聊天室</h3>
                    <p class="feature-description">加入1000+用户的大家庭，实时聊天，认识新朋友，分享生活点滴</p>
                    <div class="feature-stats">
                        <div class="stat-item">
                            <div class="stat-dot"></div>
                            <span>1,280 在线</span>
                        </div>
                    </div>
                    <div class="feature-badge">
                        <span class="material-icons">whatshot</span>
                        热门
                    </div>
                </div>
            </div>

            <!-- 附近用户 -->
            <div class="feature-card secondary" onclick="location.href='index.html'">
                <div class="feature-image">
                    <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=800&h=600&fit=crop" alt="寻找附近的男士">
                    <div class="feature-overlay"></div>
                </div>
                <div class="feature-content">
                    <h3 class="feature-title">附近用户</h3>
                    <p class="feature-description">发现附近的人，发送喜欢，开始匹配，找到与你相似的灵魂</p>
                    <div class="feature-stats">
                        <div class="stat-item">
                            <div class="stat-dot"></div>
                            <span>2,560 附近</span>
                        </div>
                    </div>
                    <div class="feature-badge">
                        <span class="material-icons">star</span>
                        推荐
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <footer class="footer">
        <p>© 2026 Alike. 相似灵魂的相遇</p>
    </footer>
</body>
</html>
