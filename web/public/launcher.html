<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alike - 相似灵魂的相遇</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Material Icons 字体设置 */
        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4ff 100%);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .nav-logo-icon .material-icons {
            font-size: 26px;
            color: white;
        }

        .nav-logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn-login {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .nav-btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        /* Hero区域 */
        .hero-section {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        .hero-icon .material-icons {
            font-size: 44px;
            color: white;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 20px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .hero-description {
            font-size: 15px;
            color: #9ca3af;
        }

        /* 功能卡片区域 */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        .feature-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            animation: fadeInUp 0.8s ease;
            animation-fill-mode: both;
            position: relative;
        }

        .feature-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .feature-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(139, 92, 246, 0.2);
        }

        .feature-image {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
        }

        .feature-card.secondary .feature-image {
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
        }

        .feature-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
        }

        .feature-icon-badge {
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .feature-card.primary .feature-icon-badge {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
        }

        .feature-card.secondary .feature-icon-badge {
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
        }

        .feature-icon-badge .material-icons {
            font-size: 32px;
            color: white;
        }

        .feature-content {
            padding: 40px 32px 32px;
            text-align: center;
        }

        .feature-title {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .feature-description {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .feature-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .feature-card.primary .feature-badge {
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .feature-card.secondary .feature-badge {
            background: linear-gradient(135deg, #22c55e 0%, #06b6d4 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .feature-badge .material-icons {
            font-size: 14px;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
            font-size: 14px;
            animation: fadeIn 1s ease 0.6s;
            animation-fill-mode: both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 20px;
            }

            .nav-logo-text {
                font-size: 20px;
            }

            .nav-btn {
                padding: 8px 18px;
                font-size: 14px;
            }

            .main-content {
                padding: 40px 20px;
            }

            .hero-title {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .hero-icon {
                width: 64px;
                height: 64px;
            }

            .hero-icon .material-icons {
                font-size: 36px;
            }

            .features-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .feature-image {
                height: 180px;
            }

            .feature-icon-badge {
                width: 56px;
                height: 56px;
            }

            .feature-icon-badge .material-icons {
                font-size: 28px;
            }

            .feature-content {
                padding: 36px 24px 28px;
            }

            .feature-title {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 32px;
            }

            .hero-subtitle {
                font-size: 16px;
            }

            .feature-image {
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="nav-logo">
            <div class="nav-logo-icon">
                <span class="material-icons">favorite</span>
            </div>
            <div class="nav-logo-text">Alike</div>
        </div>
        <a href="login.html" class="nav-btn nav-btn-login">登录</a>
    </nav>

    <!-- 主内容 -->
    <div class="main-content">
        <!-- Hero区域 -->
        <div class="hero-section">
            <div class="hero-icon">
                <span class="material-icons">favorite</span>
            </div>
            <h1 class="hero-title">相似灵魂的相遇</h1>
            <p class="hero-subtitle">发现志同道合的朋友，开启你的社交之旅</p>
            <p class="hero-description">连接每一个独特的你</p>
        </div>

        <!-- 功能卡片 -->
        <div class="features-grid">
            <!-- 全局聊天室 -->
            <div class="feature-card primary" onclick="location.href='global-chat.html'">
                <div class="feature-image">
                    <div class="feature-overlay"></div>
                </div>
                <div class="feature-icon-badge">
                    <span class="material-icons">chat_bubble</span>
                </div>
                <div class="feature-content">
                    <h3 class="feature-title">全局聊天室</h3>
                    <p class="feature-description">加入1000+用户的大家庭，实时聊天，认识新朋友，分享生活点滴</p>
                    <div class="feature-badge">
                        <span class="material-icons">whatshot</span>
                        热门
                    </div>
                </div>
            </div>

            <!-- 附近用户 -->
            <div class="feature-card secondary" onclick="location.href='index.html'">
                <div class="feature-image">
                    <div class="feature-overlay"></div>
                </div>
                <div class="feature-icon-badge">
                    <span class="material-icons">people</span>
                </div>
                <div class="feature-content">
                    <h3 class="feature-title">附近用户</h3>
                    <p class="feature-description">发现附近的人，发送喜欢，开始匹配，找到与你相似的灵魂</p>
                    <div class="feature-badge">
                        <span class="material-icons">star</span>
                        推荐
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <footer class="footer">
        <p>© 2026 Alike. 相似灵魂的相遇</p>
    </footer>
</body>
</html>
