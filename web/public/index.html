<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alike - 相似灵魂的相遇</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 高级配色系统 */
            --primary-50: #f5f3ff;
            --primary-100: #ede9fe;
            --primary-200: #ddd6fe;
            --primary-300: #c4b5fd;
            --primary-400: #a78bfa;
            --primary-500: #8b5cf6;
            --primary-600: #7c3aed;
            --primary-700: #6d28d9;
            
            --gradient-start: #a78bfa;
            --gradient-mid: #8b5cf6;
            --gradient-end: #7c3aed;
            
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f5f5f5;
            
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --text-quaternary: #cccccc;
            
            --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 高级背景效果 */
        .bg-gradient-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(at 40% 20%, hsla(258, 100%, 95%, 1) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189, 100%, 96%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(258, 100%, 94%, 1) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(340, 100%, 96%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(22, 100%, 96%, 1) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(242, 100%, 96%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(343, 100%, 96%, 1) 0px, transparent 50%);
            background-size: 100% 100%;
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* 装饰性浮动元素 */
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: var(--gradient-start);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: var(--gradient-mid);
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            background: var(--gradient-end);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 玻璃态效果 */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-strong {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Auth Screen */
        .auth-screen {
            background: var(--bg-secondary);
            border-radius: var(--radius-2xl);
            padding: 48px 40px;
            margin-top: 40px;
            box-shadow: var(--shadow-2xl);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .auth-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            position: relative;
        }

        .logo-icon-wrapper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            border-radius: 50%;
            opacity: 0.2;
            filter: blur(20px);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.3; }
        }

        .logo-icon {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }

        .logo h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -1.5px;
            position: relative;
        }

        .logo h1::after {
            content: 'Alike';
            position: absolute;
            left: 0;
            top: 0;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(30px);
            opacity: 0.3;
            z-index: -1;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .form-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 32px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--primary-100);
            border-radius: var(--radius-lg);
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-500);
            background: var(--bg-secondary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
            transform: translateY(-1px);
        }

        .form-group input::placeholder {
            color: var(--text-quaternary);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .toggle-auth a {
            color: var(--primary-600);
            text-decoration: none;
            font-weight: 700;
            position: relative;
        }

        .toggle-auth a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-600);
            transition: width 0.3s;
        }

        .toggle-auth a:hover::after {
            width: 100%;
        }

        /* App Screen */
        .app-screen {
            display: none;
        }

        .header {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-lg);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .header-logo svg {
            width: 24px;
            height: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .logout-btn {
            padding: 10px 18px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 2px solid var(--primary-100);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--primary-50);
            border-color: var(--primary-300);
            color: var(--primary-700);
            transform: translateY(-1px);
        }

        .tabs {
            display: flex;
            gap: 10px;
            background: var(--bg-tertiary);
            padding: 6px;
            border-radius: var(--radius-lg);
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .tab.active {
            background: var(--bg-secondary);
            color: var(--primary-700);
            box-shadow: var(--shadow-sm);
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.5);
        }

        .content {
            min-height: 400px;
        }

        .user-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--primary-50);
        }

        .user-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-100);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        .avatar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .user-info h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .user-info p {
            font-size: 14px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .user-bio {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--primary-400);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 6px 14px;
            background: var(--primary-50);
            color: var(--primary-700);
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--primary-200);
            transition: all 0.2s;
        }

        .tag:hover {
            background: var(--primary-100);
            border-color: var(--primary-300);
            transform: translateY(-1px);
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .like-btn {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid));
            color: white;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.3);
        }

        .like-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--primary-600);
            font-size: 16px;
            font-weight: 600;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 16px;
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            border-left: 4px solid #dc2626;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow-sm);
        }

        .success {
            background: #f0fdf4;
            color: #16a34a;
            padding: 16px;
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            border-left: 4px solid #16a34a;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow-sm);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-state-text {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state-sub {
            font-size: 14px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* Stats card */
        .stats-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: 32px;
            margin-bottom: 16px;
            text-align: center;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
        }

        .stats-icon {
            font-size: 56px;
            margin-bottom: 16px;
            filter: drop-shadow(0 4px 12px rgba(139, 92, 246, 0.2));
        }

        .stats-number {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1;
            letter-spacing: -2px;
        }

        .stats-label {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .tab-icon {
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <!-- 高级背景效果 -->
    <div class="bg-gradient-mesh"></div>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <!-- Auth Screen -->
        <div id="authScreen" class="auth-screen">
            <div class="logo">
                <div class="logo-icon-wrapper">
                    <div class="logo-icon">
                        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#a78bfa"/>
                                    <stop offset="50%" style="stop-color:#8b5cf6"/>
                                    <stop offset="100%" style="stop-color:#7c3aed"/>
                                </linearGradient>
                            </defs>
                            <circle cx="50" cy="50" r="42" stroke="url(#logoGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
                            <path d="M50 72 C50 72, 28 58, 28 42 C28 32, 38 28, 50 38" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
                            <path d="M50 72 C50 72, 72 58, 72 42 C72 32, 62 28, 50 38" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
                            <circle cx="50" cy="45" r="4" fill="url(#logoGrad)"/>
                        </svg>
                    </div>
                </div>
                <h1>Alike</h1>
                <p>相似灵魂的相遇</p>
            </div>
            
            <div id="loginForm">
                <div class="form-title">欢迎回来</div>
                <div class="form-group">
                    <label>手机号</label>
                    <div class="input-wrapper">
                        <input type="tel" id="loginPhone" value="+8613800138000" placeholder="+8613800138000">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" value="password123" placeholder="••••••••">
                    </div>
                </div>
                <button class="btn" onclick="login()">登录</button>
                <div class="toggle-auth">
                    还没有账号？<a href="#" onclick="toggleAuth('register')">立即注册</a>
                </div>
            </div>

            <div id="registerForm" class="hidden">
                <div class="form-title">创建账号</div>
                <div class="form-group">
                    <label>手机号</label>
                    <div class="input-wrapper">
                        <input type="tel" id="registerPhone" placeholder="+8613800138000">
                    </div>
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <div class="input-wrapper">
                        <input type="text" id="registerCode" placeholder="123456">
                    </div>
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <div class="input-wrapper">
                        <input type="text" id="registerNickname" placeholder="你的昵称">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="registerPassword" placeholder="至少8位字符">
                    </div>
                </div>
                <button class="btn" onclick="register()">创建账号</button>
                <div class="toggle-auth">
                    已有账号？<a href="#" onclick="toggleAuth('login')">立即登录</a>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="appScreen" class="app-screen">
            <div class="header">
                <div class="header-content">
                    <div class="header-left">
                        <div class="header-logo">
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#a78bfa"/>
                                        <stop offset="50%" style="stop-color:#8b5cf6"/>
                                        <stop offset="100%" style="stop-color:#7c3aed"/>
                                    </linearGradient>
                                </defs>
                                <circle cx="50" cy="50" r="42" stroke="url(#headerGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
                                <path d="M50 72 C50 72, 28 58, 28 42 C28 32, 38 28, 50 38" stroke="url(#headerGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
                                <path d="M50 72 C50 72, 72 58, 72 42 C72 32, 62 28, 50 38" stroke="url(#headerGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
                                <circle cx="50" cy="45" r="4" fill="url(#headerGrad)"/>
                            </svg>
                        </div>
                        <h1>Alike</h1>
                    </div>
                    <button class="logout-btn" onclick="logout()">退出</button>
                </div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('nearby')">
                        <span class="tab-icon">🌍</span>附近
                    </button>
                    <button class="tab" onclick="switchTab('matches')">
                        <span class="tab-icon">💕</span>匹配
                    </button>
                    <button class="tab" onclick="switchTab('chats')">
                        <span class="tab-icon">💬</span>聊天
                    </button>
                </div>
            </div>

            <div class="content">
                <div id="nearbyContent"></div>
                <div id="matchesContent" class="hidden"></div>
                <div id="chatsContent" class="hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';
        let accessToken = localStorage.getItem('accessToken');

        if (accessToken) showApp();

        function toggleAuth(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            if (type === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerForm.style.animation = 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            } else {
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
                loginForm.style.animation = 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            }
        }

        async function login() {
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await response.json();

                if (data.success) {
                    accessToken = data.data.tokens.access_token;
                    localStorage.setItem('accessToken', accessToken);
                    showApp();
                } else {
                    showError(data.error?.message || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请检查API是否启动');
            }
        }

        async function register() {
            const phone = document.getElementById('registerPhone').value;
            const code = document.getElementById('registerCode').value;
            const nickname = document.getElementById('registerNickname').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, verification_code: code, nickname, password })
                });
                const data = await response.json();

                if (data.success) {
                    accessToken = data.data.tokens.access_token;
                    localStorage.setItem('accessToken', accessToken);
                    showApp();
                } else {
                    showError(data.error?.message || '注册失败');
                }
            } catch (error) {
                showError('网络错误');
            }
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            loadNearbyUsers();
        }

        function logout() {
            localStorage.removeItem('accessToken');
            location.reload();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');

            ['nearbyContent', 'matchesContent', 'chatsContent'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });

            const tabMap = {
                'nearby': 'nearbyContent',
                'matches': 'matchesContent',
                'chats': 'chatsContent'
            };

            document.getElementById(tabMap[tab]).classList.remove('hidden');

            if (tab === 'nearby') loadNearbyUsers();
            else if (tab === 'matches') loadMatches();
            else if (tab === 'chats') loadChats();
        }

        async function loadNearbyUsers() {
            const content = document.getElementById('nearbyContent');
            content.innerHTML = '<div class="loading">正在加载附近用户</div>';

            try {
                const response = await fetch(
                    `${API_BASE}/users/nearby?lat=31.2304&lng=121.4737&radius=10`,
                    { headers: { 'Authorization': `Bearer ${accessToken}` } }
                );
                const data = await response.json();

                if (data.success) {
                    displayUsers(data.data.users || [], content);
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误，请检查API是否启动<br><small>运行: go run cmd/api/main.go</small></div>';
            }
        }

        function displayUsers(users, container) {
            if (!users || users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💫</div>
                        <div class="empty-state-text">暂无用户</div>
                        <div class="empty-state-sub">运行 ./scripts/setup-db.sh 导入测试数据</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = users.map((user, index) => `
                <div class="user-card" style="animation-delay: ${index * 0.1}s">
                    <div class="user-card-header">
                        <div class="avatar">${user.nickname ? user.nickname[0].toUpperCase() : '?'}</div>
                        <div class="user-info">
                            <h3>${user.nickname || 'Anonymous'}</h3>
                            <p>${user.bio || '这个人很懒，什么都没写'}</p>
                        </div>
                    </div>
                    ${user.bio ? `<div class="user-bio">${user.bio}</div>` : ''}
                    <div class="tags">
                        <span class="tag">🌈 社区</span>
                        <span class="tag">💬 在线</span>
                    </div>
                    <div class="actions">
                        <button class="action-btn like-btn" onclick="likeUser('${user.id}')">💝 喜欢</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadMatches() {
            const content = document.getElementById('matchesContent');
            content.innerHTML = '<div class="loading">正在加载匹配</div>';
            
            try {
                const response = await fetch(`${API_BASE}/matches`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }  
                });
                const data = await response.json();

                if (data.success) {
                    if (!data.data || data.data.length === 0) {
                        content.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">✨</div>
                                <div class="empty-state-text">暂无匹配</div>
                                <div class="empty-state-sub">喜欢更多用户来获得匹配</div>
                            </div>
                        `;
                    } else {
                        content.innerHTML = `
                            <div class="stats-card">
                                <div class="stats-icon">💕</div>
                                <div class="stats-number">${data.data.length}</div>
                                <div class="stats-label">个匹配</div>
                            </div>
                        `;
                    }
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误</div>';
            }
        }

        async function loadChats() {
            const content = document.getElementById('chatsContent');
            content.innerHTML = '<div class="loading">正在加载聊天</div>';
            
            try {
                const response = await fetch(`${API_BASE}/chats`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();

                if (data.success) {
                    if (!data.data || data.data.length === 0) {
                        content.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">💬</div>
                                <div class="empty-state-text">暂无聊天</div>
                                <div class="empty-state-sub">与匹配的人开始聊天吧</div>
                            </div>
                        `;
                    } else {
                        content.innerHTML = `
                            <div class="stats-card">
                                <div class="stats-icon">💬</div>
                                <div class="stats-number">${data.data.length}</div>
                                <div class="stats-label">个聊天</div>
                            </div>
                        `;
                    }
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误</div>';
            }
        }

        async function likeUser(userId) {
            try {
                const response = await fetch(`${API_BASE}/matches/${userId}/like`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                data.success ? showSuccess('已发送喜欢！') : showError(data.error?.message || '操作失败');
            } catch (error) {
                showError('网络错误');
            }
        }

        function showError(message) {
            showNotification(message, 'error');
        }

        function showSuccess(message) {
            showNotification(message, 'success');
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = type;
            notification.textContent = message;
            notification.style.cssText = 'position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);';
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s cubic-bezier(0.4, 0, 1, 1) reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
