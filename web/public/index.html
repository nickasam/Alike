<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alike - 连接真实的自己</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Auth Screen */
        .auth-screen {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            margin-top: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6b7280;
            font-size: 15px;
            font-weight: 400;
        }

        .form-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 14px;
        }

        .toggle-auth a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        /* App Screen */
        .app-screen {
            display: none;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1f2937;
        }

        .logout-btn {
            padding: 10px 16px;
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #e5e7eb;
            color: #374151;
        }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: #f3f4f6;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            color: #6b7280;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .content {
            margin-top: 20px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s ease-out;
            transition: all 0.3s;
        }

        .user-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .user-info h3 {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .user-info p {
            font-size: 14px;
            color: #9ca3af;
        }

        .user-bio {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.5;
            padding: 15px;
            background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .tag {
            padding: 6px 12px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #0369a1;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .like-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .like-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: white;
            font-size: 16px;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            background: rgba(254, 242, 242, 0.95);
            backdrop-filter: blur(20px);
            color: #dc2626;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #dc2626;
            font-weight: 500;
        }

        .success {
            background: rgba(236, 253, 245, 0.95);
            backdrop-filter: blur(20px);
            color: #059669;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #059669;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-state-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Stats card */
        .stats-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .stats-number {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .stats-label {
            font-size: 16px;
            color: #6b7280;
            font-weight: 500;
        }

        /* Enhanced input focus */
        .form-group input::placeholder {
            color: #9ca3af;
        }

        /* Better button states */
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Smooth transitions */
        * {
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth Screen -->
        <div id="authScreen" class="auth-screen">
            <div class="logo">
                <div class="logo-icon">✓</div>
                <h1>Alike</h1>
                <p>连接真实的自己</p>
            </div>
            
            <div id="loginForm">
                <div class="form-title">欢迎回来</div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="loginPhone" value="+8613800138000" placeholder="+8613800138000">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" value="password123" placeholder="••••••••">
                </div>
                <button class="btn" onclick="login()">登录</button>
                <div class="toggle-auth">
                    还没有账号？<a href="#" onclick="toggleAuth('register')">立即注册</a>
                </div>
            </div>

            <div id="registerForm" class="hidden">
                <div class="form-title">创建账号</div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="registerPhone" placeholder="+8613800138000">
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <input type="text" id="registerCode" placeholder="123456">
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="registerNickname" placeholder="你的昵称">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="registerPassword" placeholder="至少8位字符">
                </div>
                <button class="btn" onclick="register()">创建账号</button>
                <div class="toggle-auth">
                    已有账号？<a href="#" onclick="toggleAuth('login')">立即登录</a>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="appScreen" class="app-screen">
            <div class="header">
                <div class="header-content">
                    <div class="header-left">
                        <div class="header-logo">✓</div>
                        <h1>Alike</h1>
                    </div>
                    <button class="logout-btn" onclick="logout()">退出</button>
                </div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('nearby')">附近</button>
                    <button class="tab" onclick="switchTab('matches')">匹配</button>
                    <button class="tab" onclick="switchTab('chats')">聊天</button>
                </div>
            </div>

            <div class="content">
                <div id="nearbyContent"></div>
                <div id="matchesContent" class="hidden"></div>
                <div id="chatsContent" class="hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';
        let accessToken = localStorage.getItem('accessToken');

        if (accessToken) showApp();

        function toggleAuth(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            if (type === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerForm.style.animation = 'slideUp 0.3s ease-out';
            } else {
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
                loginForm.style.animation = 'slideUp 0.3s ease-out';
            }
        }

        async function login() {
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await response.json();

                if (data.success) {
                    accessToken = data.data.tokens.access_token;
                    localStorage.setItem('accessToken', accessToken);
                    showApp();
                } else {
                    showError(data.error?.message || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请检查API是否启动');
            }
        }

        async function register() {
            const phone = document.getElementById('registerPhone').value;
            const code = document.getElementById('registerCode').value;
            const nickname = document.getElementById('registerNickname').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, verification_code: code, nickname, password })
                });
                const data = await response.json();

                if (data.success) {
                    accessToken = data.data.tokens.access_token;
                    localStorage.setItem('accessToken', accessToken);
                    showApp();
                } else {
                    showError(data.error?.message || '注册失败');
                }
            } catch (error) {
                showError('网络错误');
            }
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            loadNearbyUsers();
        }

        function logout() {
            localStorage.removeItem('accessToken');
            location.reload();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');

            ['nearbyContent', 'matchesContent', 'chatsContent'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });

            const tabMap = {
                'nearby': 'nearbyContent',
                'matches': 'matchesContent',
                'chats': 'chatsContent'
            };

            document.getElementById(tabMap[tab]).classList.remove('hidden');

            if (tab === 'nearby') loadNearbyUsers();
            else if (tab === 'matches') loadMatches();
            else if (tab === 'chats') loadChats();
        }

        async function loadNearbyUsers() {
            const content = document.getElementById('nearbyContent');
            content.innerHTML = '<div class="loading">正在加载附近用户</div>';

            try {
                const response = await fetch(
                    `${API_BASE}/users/nearby?lat=31.2304&lng=121.4737&radius=10`,
                    { headers: { 'Authorization': `Bearer ${accessToken}` } }
                );
                const data = await response.json();

                if (data.success) {
                    displayUsers(data.data.users || [], content);
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误，请检查API是否启动<br><small>运行: go run cmd/api/main.go</small></div>';
            }
        }

        function displayUsers(users, container) {
            if (!users || users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <div class="empty-state-text">暂无用户</div>
                        <div class="empty-state-sub">运行 ./scripts/setup-db.sh 导入测试数据</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = users.map((user, index) => `
                <div class="user-card" style="animation-delay: ${index * 0.1}s">
                    <div class="user-card-header">
                        <div class="avatar">${user.nickname ? user.nickname[0].toUpperCase() : '?'}</div>
                        <div class="user-info">
                            <h3>${user.nickname || 'Anonymous'}</h3>
                            <p>${user.bio || '这个人很懒，什么都没写'}</p>
                        </div>
                    </div>
                    ${user.bio ? `<div class="user-bio">${user.bio}</div>` : ''}
                    <div class="tags">
                        <span class="tag">📍 附近</span>
                        <span class="tag">💬 在线</span>
                    </div>
                    <div class="actions">
                        <button class="action-btn like-btn" onclick="likeUser('${user.id}')">❤️ 喜欢</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadMatches() {
            const content = document.getElementById('matchesContent');
            content.innerHTML = '<div class="loading">正在加载匹配</div>';
            
            try {
                const response = await fetch(`${API_BASE}/matches`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();

                if (data.success) {
                    if (!data.data || data.data.length === 0) {
                        content.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">💕</div>
                                <div class="empty-state-text">暂无匹配</div>
                                <div class="empty-state-sub">喜欢更多用户来获得匹配</div>
                            </div>
                        `;
                    } else {
                        content.innerHTML = `
                            <div class="stats-card">
                                <div class="stats-number">${data.data.length}</div>
                                <div class="stats-label">个匹配</div>
                            </div>
                        `;
                    }
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误</div>';
            }
        }

        async function loadChats() {
            const content = document.getElementById('chatsContent');
            content.innerHTML = '<div class="loading">正在加载聊天</div>';
            
            try {
                const response = await fetch(`${API_BASE}/chats`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();

                if (data.success) {
                    if (!data.data || data.data.length === 0) {
                        content.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">💬</div>
                                <div class="empty-state-text">暂无聊天</div>
                                <div class="empty-state-sub">与匹配的人开始聊天吧</div>
                            </div>
                        `;
                    } else {
                        content.innerHTML = `
                            <div class="stats-card">
                                <div class="stats-number">${data.data.length}</div>
                                <div class="stats-label">个聊天</div>
                            </div>
                        `;
                    }
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误</div>';
            }
        }

        async function likeUser(userId) {
            try {
                const response = await fetch(`${API_BASE}/matches/${userId}/like`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                data.success ? showSuccess('已发送喜欢！') : showError(data.error?.message || '操作失败');
            } catch (error) {
                showError('网络错误');
            }
        }

        function showError(message) {
            showNotification(message, 'error');
        }

        function showSuccess(message) {
            showNotification(message, 'success');
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = type;
            notification.textContent = message;
            notification.style.cssText = 'position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; animation: slideDown 0.3s ease-out;';
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease-out reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
