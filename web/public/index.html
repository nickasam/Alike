<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alike - 相似灵魂的相遇</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8f4ff 0%, #f0f4ff 50%, #f4f0ff 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景插图 */
        .background-illustration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 900px;
            height: auto;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        .background-illustration svg {
            width: 100%;
            height: auto;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Auth Screen */
        .auth-screen {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 45px 35px;
            margin-top: 35px;
            box-shadow: 0 20px 60px rgba(100, 80, 160, 0.08);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 8px 24px rgba(100, 80, 160, 0.12));
        }

        .logo h1 {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(135deg, #a890d4 0%, #8b7db5 50%, #9d8fc4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .logo p {
            color: #8b8b9a;
            font-size: 14px;
            font-weight: 400;
        }

        .form-title {
            font-size: 22px;
            font-weight: 600;
            color: #2d2d3a;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #5d5d6a;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e8e6ed;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            background: #faf9fc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #b5a5d4;
            background: white;
            box-shadow: 0 0 0 3px rgba(181, 165, 212, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #a890d4 0%, #8b7db5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(168, 144, 212, 0.25);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(168, 144, 212, 0.35);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: #8b8b9a;
            font-size: 13px;
        }

        .toggle-auth a {
            color: #a890d4;
            text-decoration: none;
            font-weight: 600;
        }

        /* App Screen */
        .app-screen {
            display: none;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 18px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(100, 80, 160, 0.06);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 42px;
            height: 42px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo svg {
            width: 100%;
            height: 100%;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #a890d4 0%, #8b7db5 50%, #9d8fc4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logout-btn {
            padding: 8px 14px;
            background: #f4f3f8;
            color: #7b7b8a;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #ebe9f2;
            color: #5d5d6a;
        }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .tab {
            flex: 1;
            padding: 11px;
            background: #f4f3f8;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            color: #7b7b8a;
            transition: all 0.2s;
            font-size: 14px;
        }

        .tab.active {
            background: linear-gradient(135deg, #a890d4 0%, #8b7db5 100%);
            color: white;
            box-shadow: 0 3px 10px rgba(168, 144, 212, 0.2);
        }

        .content {
            margin-top: 18px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 3px 16px rgba(100, 80, 160, 0.06);
            animation: fadeInUp 0.5s ease-out;
            transition: all 0.2s;
        }

        .user-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(100, 80, 160, 0.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #d4c4e8 0%, #c8b8dc 50%, #ddd0ed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(168, 144, 212, 0.18);
        }

        .user-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #2d2d3a;
            margin-bottom: 4px;
        }

        .user-info p {
            font-size: 13px;
            color: #8b8b9a;
        }

        .user-bio {
            font-size: 14px;
            color: #6d6d7a;
            line-height: 1.6;
            padding: 13px;
            background: linear-gradient(135deg, #faf9fc 0%, #f8f7fc 100%);
            border-radius: 11px;
            border-left: 3px solid #d4c4e8;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .tag {
            padding: 5px 11px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag:nth-child(1) {
            background: linear-gradient(135deg, #f0eff5, #e8e6f0);
            color: #7d6da8;
        }

        .tag:nth-child(2) {
            background: linear-gradient(135deg, #fff5f0, #ffe8e0);
            color: #a87d6d;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .action-btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 11px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .like-btn {
            background: linear-gradient(135deg, #d4c4e8 0%, #c8b8dc 100%);
            color: #5d4a8a;
            box-shadow: 0 3px 10px rgba(168, 144, 212, 0.2);
        }

        .like-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 14px rgba(168, 144, 212, 0.28);
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #8b7db5;
            font-size: 15px;
            font-weight: 500;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            background: rgba(254, 242, 242, 0.95);
            backdrop-filter: blur(20px);
            color: #c44;
            padding: 14px;
            border-radius: 11px;
            margin-bottom: 14px;
            border-left: 3px solid #e88;
            font-weight: 500;
            font-size: 13px;
        }

        .success {
            background: rgba(242, 253, 245, 0.95);
            backdrop-filter: blur(20px);
            color: #4a8;
            padding: 14px;
            border-radius: 11px;
            margin-bottom: 14px;
            border-left: 3px solid #6b9;
            font-weight: 500;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a890d4;
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-state-text {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #8b7db5;
        }

        .empty-state-sub {
            font-size: 13px;
            color: #9d8fc4;
        }

        /* Stats card */
        .stats-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 14px;
            text-align: center;
            box-shadow: 0 3px 16px rgba(100, 80, 160, 0.06);
        }

        .stats-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .stats-number {
            font-size: 52px;
            font-weight: 700;
            background: linear-gradient(135deg, #a890d4 0%, #8b7db5 50%, #9d8fc4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            line-height: 1;
        }

        .stats-label {
            font-size: 14px;
            color: #7b7b8a;
            font-weight: 500;
        }

        .tab-icon {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <!-- 背景插图：两个男人喝咖啡聊天 -->
    <div class="background-illustration">
        <svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 地面 -->
            <ellipse cx="400" cy="520" rx="300" ry="30" fill="#e8e4f0"/>
            
            <!-- 桌子 -->
            <rect x="200" y="380" width="400" height="20" rx="10" fill="#d4c4e8"/>
            <rect x="380" y="400" width="40" height="120" fill="#c8b8dc"/>
            <rect x="320" y="510" width="160" height="15" rx="5" fill="#c8b8dc"/>

            <ellipse cx="280" cy="375" rx="25" ry="8" fill="#fff"/>

            <path d="M305 365 C315 365, 315 375, 305 375" stroke="#fff" stroke-width="3" fill="none"/>

                <path d="M230 320 Q200 340, 210 360" stroke="#a890d4" stroke-width="25" fill="none" stroke-linecap="round"/>
                <!-- 右臂（放在桌上） -->

                <path d="M500 380 L500 300 Q500 280, 520 280 L550 280 Q570 280, 570 300 L570 380" fill="#8b7db5"/>

                <path d="M500 250 Q500 210, 535 210 Q570 210, 570 250 L570 265 Q570 235, 535 235 Q500 235, 500 265 Z" fill="#3d3d5a"/>
                <!-- 面部细节 -->
                <circle cx="520" cy="250" r="3" fill="#4a4a5a"/>
                <circle cx="550" cy="250" r="3" fill="#4a4a5a"/>
                <path d="M525 265 Q535 270, 545 265" stroke="#c88" stroke-width="2" fill="none"/>
                <!-- 左臂（放在桌上） -->
                <path d="M500 320 Q470 350, 510 375" stroke="#8b7db5" stroke-width="25" fill="none" stroke-linecap="round"/>
                <!-- 右臂 -->
                <path d="M570 320 Q600 340, 590 360" stroke="#8b7db5" stroke-width="25" fill="none" stroke-linecap="round"/>
                <!-- 手 -->
                <circle cx="510" cy="378" r="12" fill="#f0d4c4"/>

            <!-- 对话气泡1 -->
            <g id="bubble-left">
                <path d="M200 180 Q200 150, 240 150 L280 150 Q320 150, 320 180 L320 210 Q320 240, 280 240 L240 240 L220 260 L225 240 Q200 240, 200 210 Z" fill="#fff" stroke="#e8e6ed" stroke-width="2"/>
                <text x="260" y="200" font-family="Inter, sans-serif" font-size="16" fill="#5d5d6a" text-anchor="middle">Hi! 👋</text>

            <!-- 对话气泡2 -->
            <g id="bubble-right">
                <path d="M480 180 Q480 150, 520 150 L560 150 Q600 150, 600 180 L600 210 Q600 240, 560 240 L520 240 L500 260 L505 240 Q480 240, 480 210 Z" fill="#fff" stroke="#e8e6ed" stroke-width="2"/>
                <text x="540" y="200" font-family="Inter, sans-serif" font-size="16" fill="#5d5d6a" text-anchor="middle">很高兴见到你</text>

            <path d="M400 120 L400 105 L385 90 Q400 75, 415 90 L400 105 L400 120" fill="#d4c4e8" opacity="0.4"/>

    </div>

    <div class="container">
        <!-- Auth Screen -->
        <div id="authScreen" class="auth-screen">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- 外圈淡雅渐变环 -->
                        <circle cx="50" cy="50" r="42" stroke="url(#elegant)" stroke-width="8" fill="none" stroke-linecap="round"/>
                        
                        <!-- 内圈心形 - 两条优雅的弧线 -->
                        <path d="M50 72 C50 72, 28 58, 28 42 C28 32, 38 28, 50 38" 
                              stroke="#d4c4e8" stroke-width="7" stroke-linecap="round" fill="none"/>
                        
                        <path d="M50 72 C50 72, 72 58, 72 42 C72 32, 62 28, 50 38" 
                              stroke="#c8b8dc" stroke-width="7" stroke-linecap="round" fill="none"/>
                        
                        <!-- 中心优雅连接点 -->
                        <circle cx="50" cy="45" r="5" fill="url(#elegant)"/>
                        
                        <!-- 渐变定义 - 淡雅紫色调 -->
                        <defs>
                            <linearGradient id="elegant" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#d4c4e8"/>
                                <stop offset="50%" style="stop-color:#c8b8dc"/>
                                <stop offset="100%" style="stop-color:#ddd0ed"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>Alike</h1>
                <p>相似灵魂的相遇</p>
            </div>
            
            <div id="loginForm">
                <div class="form-title">欢迎回来</div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="loginPhone" value="+8613800138000" placeholder="+8613800138000">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" value="password123" placeholder="••••••••">
                </div>
                <button class="btn" onclick="login()">登录</button>
                <div class="toggle-auth">
                    还没有账号？<a href="#" onclick="toggleAuth('register')">立即注册</a>
                </div>
            </div>

            <div id="registerForm" class="hidden">
                <div class="form-title">创建账号</div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="registerPhone" placeholder="+8613800138000">
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <input type="text" id="registerCode" placeholder="123456">
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="registerNickname" placeholder="你的昵称">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="registerPassword" placeholder="至少8位字符">
                </div>
                <button class="btn" onclick="register()">创建账号</button>
                <div class="toggle-auth">
                    已有账号？<a href="#" onclick="toggleAuth('login')">立即登录</a>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="appScreen" class="app-screen">
            <div class="header">
                <div class="header-content">
                    <div class="header-left">
                        <div class="header-logo">
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="42" stroke="url(#elegant)" stroke-width="8" fill="none" stroke-linecap="round"/>
                                <path d="M50 72 C50 72, 28 58, 28 42 C28 32, 38 28, 50 38" stroke="#d4c4e8" stroke-width="7" stroke-linecap="round" fill="none"/>
                                <path d="M50 72 C50 72, 72 58, 72 42 C72 32, 62 28, 50 38" stroke="#c8b8dc" stroke-width="7" stroke-linecap="round" fill="none"/>
                                <circle cx="50" cy="45" r="5" fill="url(#elegant)"/>
                                <defs>
                                    <linearGradient id="elegant" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#d4c4e8"/>
                                        <stop offset="50%" style="stop-color:#c8b8dc"/>
                                        <stop offset="100%" style="stop-color:#ddd0ed"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <h1>Alike</h1>
                    </div>
                    <button class="logout-btn" onclick="logout()">退出</button>
                </div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('nearby')">
                        <span class="tab-icon">🌍</span>附近
                    </button>
                    <button class="tab" onclick="switchTab('matches')">
                        <span class="tab-icon">💕</span>匹配
                    </button>
                    <button class="tab" onclick="switchTab('chats')">
                        <span class="tab-icon">💬</span>聊天
                    </button>
                </div>
            </div>

            <div class="content">
                <div id="nearbyContent"></div>
                <div id="matchesContent" class="hidden"></div>
                <div id="chatsContent" class="hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';
        let accessToken = localStorage.getItem('accessToken');

        if (accessToken) showApp();

        function toggleAuth(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            if (type === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerForm.style.animation = 'slideUp 0.3s ease-out';
            } else {
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
                loginForm.style.animation = 'slideUp 0.3s ease-out';
            }
        }

        async function login() {
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await response.json();

                if (data.success) {
                    accessToken = data.data.tokens.access_token;
                    localStorage.setItem('accessToken', accessToken);
                    showApp();
                } else {
                    showError(data.error?.message || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请检查API是否启动');
            }
        }

        async function register() {
            const phone = document.getElementById('registerPhone').value;
            const code = document.getElementById('registerCode').value;
            const nickname = document.getElementById('registerNickname').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, verification_code: code, nickname, password })
                });
                const data = await response.json();

                if (data.success) {
                    accessToken = data.data.tokens.access_token;
                    localStorage.setItem('accessToken', accessToken);
                    showApp();
                } else {
                    showError(data.error?.message || '注册失败');
                }
            } catch (error) {
                showError('网络错误');
            }
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            loadNearbyUsers();
        }

        function logout() {
            localStorage.removeItem('accessToken');
            location.reload();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');

            ['nearbyContent', 'matchesContent', 'chatsContent'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });

            const tabMap = {
                'nearby': 'nearbyContent',
                'matches': 'matchesContent',
                'chats': 'chatsContent'
            };

            document.getElementById(tabMap[tab]).classList.remove('hidden');

            if (tab === 'nearby') loadNearbyUsers();
            else if (tab === 'matches') loadMatches();
            else if (tab === 'chats') loadChats();
        }

        async function loadNearbyUsers() {
            const content = document.getElementById('nearbyContent');
            content.innerHTML = '<div class="loading">正在加载附近用户</div>';

            try {
                const response = await fetch(
                    `${API_BASE}/users/nearby?lat=31.2304&lng=121.4737&radius=10`,
                    { headers: { 'Authorization': `Bearer ${accessToken}` } }
                );
                const data = await response.json();

                if (data.success) {
                    displayUsers(data.data.users || [], content);
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误，请检查API是否启动<br><small>运行: go run cmd/api/main.go</small></div>';
            }
        }

        function displayUsers(users, container) {
            if (!users || users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💫</div>
                        <div class="empty-state-text">暂无用户</div>
                        <div class="empty-state-sub">运行 ./scripts/setup-db.sh 导入测试数据</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = users.map((user, index) => `
                <div class="user-card" style="animation-delay: ${index * 0.1}s">
                    <div class="user-card-header">
                        <div class="avatar">${user.nickname ? user.nickname[0].toUpperCase() : '?'}</div>
                        <div class="user-info">
                            <h3>${user.nickname || 'Anonymous'}</h3>
                            <p>${user.bio || '这个人很懒，什么都没写'}</p>
                        </div>
                    </div>
                    ${user.bio ? `<div class="user-bio">${user.bio}</div>` : ''}
                    <div class="tags">
                        <span class="tag">🌈 社区</span>
                        <span class="tag">💬 在线</span>
                    </div>
                    <div class="actions">
                        <button class="action-btn like-btn" onclick="likeUser('${user.id}')">💝 喜欢</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadMatches() {
            const content = document.getElementById('matchesContent');
            content.innerHTML = '<div class="loading">正在加载匹配</div>';
            
            try {
                const response = await fetch(`${API_BASE}/matches`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }  
                });
                const data = await response.json();

                if (data.success) {
                    if (!data.data || data.data.length === 0) {
                        content.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">✨</div>
                                <div class="empty-state-text">暂无匹配</div>
                                <div class="empty-state-sub">喜欢更多用户来获得匹配</div>
                            </div>
                        `;
                    } else {
                        content.innerHTML = `
                            <div class="stats-card">
                                <div class="stats-icon">💕</div>
                                <div class="stats-number">${data.data.length}</div>
                                <div class="stats-label">个匹配</div>
                            </div>
                        `;
                    }
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误</div>';
            }
        }

        async function loadChats() {
            const content = document.getElementById('chatsContent');
            content.innerHTML = '<div class="loading">正在加载聊天</div>';
            
            try {
                const response = await fetch(`${API_BASE}/chats`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();

                if (data.success) {
                    if (!data.data || data.data.length === 0) {
                        content.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">💬</div>
                                <div class="empty-state-text">暂无聊天</div>
                                <div class="empty-state-sub">与匹配的人开始聊天吧</div>
                            </div>
                        `;
                    } else {
                        content.innerHTML = `
                            <div class="stats-card">
                                <div class="stats-icon">💬</div>
                                <div class="stats-number">${data.data.length}</div>
                                <div class="stats-label">个聊天</div>
                            </div>
                        `;
                    }
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误</div>';
            }
        }

        async function likeUser(userId) {
            try {
                const response = await fetch(`${API_BASE}/matches/${userId}/like`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                data.success ? showSuccess('已发送喜欢！') : showError(data.error?.message || '操作失败');
            } catch (error) {
                showError('网络错误');
            }
        }

        function showError(message) {
            showNotification(message, 'error');
        }

        function showSuccess(message) {
            showNotification(message, 'success');
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = type;
            notification.textContent = message;
            notification.style.cssText = 'position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; animation: slideDown 0.3s ease-out;';
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease-out reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
