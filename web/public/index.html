<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alike - 相似灵魂的相遇</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e40303 0%, #ff8c00 16%, #ffed00 33%, #008026 50%, #24408e 66%, #732982 83%, #e40303 100%);
            background-size: 400% 400%;
            animation: rainbow 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Auth Screen */
        .auth-screen {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 45px 35px;
            margin-top: 35px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 12px 35px rgba(0,0,0,0.25));
        }

        .logo h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #e40303 0%, #ff8c00 25%, #008026 50%, #24408e 75%, #732982 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }

        .logo p {
            color: #6b7280;
            font-size: 15px;
            font-weight: 400;
        }

        .form-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .form-group input:focus {
            outline: none;
            border-color: #732982;
            background: white;
            box-shadow: 0 0 0 4px rgba(115, 41, 130, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #732982 0%, #24408e 50%, #008026 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(115, 41, 130, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(115, 41, 130, 0.5);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 14px;
        }

        .toggle-auth a {
            color: #732982;
            text-decoration: none;
            font-weight: 600;
        }

        /* App Screen */
        .app-screen {
            display: none;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 22px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 46px;
            height: 46px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo svg {
            width: 100%;
            height: 100%;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #e40303 0%, #ff8c00 25%, #008026 50%, #24408e 75%, #732982 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .logout-btn {
            padding: 10px 16px;
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #e5e7eb;
            color: #374151;
        }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: #f3f4f6;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            color: #6b7280;
            transition: all 0.3s;
            font-size: 15px;
        }

        .tab.active {
            background: linear-gradient(135deg, #732982 0%, #24408e 50%, #008026 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(115, 41, 130, 0.3);
        }

        .content {
            margin-top: 20px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s ease-out;
            transition: all 0.3s;
        }

        .user-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: linear-gradient(135deg, #e40303 0%, #ff8c00 33%, #008026 66%, #732982 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(115, 41, 130, 0.3);
            position: relative;
            overflow: hidden;
        }

        .avatar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .user-info h3 {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .user-info p {
            font-size: 14px;
            color: #9ca3af;
        }

        .user-bio {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.5;
            padding: 15px;
            background: linear-gradient(135deg, #fef2f2 0%, #fff7ed 25%, #f0fdf4 50%, #eff6ff 75%, #faf5ff 100%);
            border-radius: 12px;
            border-left: 4px solid #732982;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .tag:nth-child(1) {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
        }

        .tag:nth-child(2) {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .like-btn {
            background: linear-gradient(135deg, #e40303 0%, #ff8c00 50%, #008026 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(228, 3, 3, 0.3);
        }

        .like-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(228, 3, 3, 0.4);
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            background: rgba(254, 242, 242, 0.98);
            backdrop-filter: blur(20px);
            color: #dc2626;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #dc2626;
            font-weight: 500;
        }

        .success {
            background: rgba(236, 253, 245, 0.98);
            backdrop-filter: blur(20px);
            color: #059669;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #059669;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state-icon {
            font-size: 72px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(2deg); }
            75% { transform: translateY(-8px) rotate(-2deg); }
        }

        .empty-state-text {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .empty-state-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Stats card */
        .stats-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .stats-icon {
            font-size: 64px;
            margin-bottom: 16px;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.15));
        }

        .stats-number {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #e40303 0%, #ff8c00 25%, #008026 50%, #24408e 75%, #732982 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            line-height: 1;
        }

        .stats-label {
            font-size: 17px;
            color: #6b7280;
            font-weight: 500;
        }

        .tab-icon {
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth Screen -->
        <div id="authScreen" class="auth-screen">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- 外圈彩虹环 -->
                        <circle cx="60" cy="60" r="50" stroke="url(#rainbow1)" stroke-width="12" fill="none" stroke-linecap="round"/>
                        
                        <!-- 内圈心形 - 由两个交织的弧组成 -->
                        <!-- 左半心 -->
                        <path d="M60 85 C60 85, 30 65, 30 45 C30 30, 45 25, 60 40" 
                              stroke="#e40303" stroke-width="10" stroke-linecap="round" fill="none"/>
                        
                        <!-- 右半心 -->
                        <path d="M60 85 C60 85, 90 65, 90 45 C90 30, 75 25, 60 40" 
                              stroke="#ff8c00" stroke-width="10" stroke-linecap="round" fill="none"/>
                        
                        <!-- 中心连接点 -->
                        <circle cx="60" cy="55" r="8" fill="url(#rainbow2)"/>
                        
                        <!-- 渐变定义 -->
                        <defs>
                            <linearGradient id="rainbow1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#e40303"/>
                                <stop offset="20%" style="stop-color:#ff8c00"/>
                                <stop offset="40%" style="stop-color:#ffed00"/>
                                <stop offset="60%" style="stop-color:#008026"/>
                                <stop offset="80%" style="stop-color:#24408e"/>
                                <stop offset="100%" style="stop-color:#732982"/>
                            </linearGradient>
                            <linearGradient id="rainbow2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#ff8c00"/>
                                <stop offset="50%" style="stop-color:#008026"/>
                                <stop offset="100%" style="stop-color:#732982"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>Alike</h1>
                <p>相似灵魂的相遇</p>
            </div>
            
            <div id="loginForm">
                <div class="form-title">欢迎回来 🏳️‍🌈</div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="loginPhone" value="+8613800138000" placeholder="+8613800138000">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" value="password123" placeholder="••••••••">
                </div>
                <button class="btn" onclick="login()">登录</button>
                <div class="toggle-auth">
                    还没有账号？<a href="#" onclick="toggleAuth('register')">立即注册</a>
                </div>
            </div>

            <div id="registerForm" class="hidden">
                <div class="form-title">创建账号 🌈</div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="registerPhone" placeholder="+8613800138000">
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <input type="text" id="registerCode" placeholder="123456">
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="registerNickname" placeholder="你的昵称">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="registerPassword" placeholder="至少8位字符">
                </div>
                <button class="btn" onclick="register()">创建账号</button>
                <div class="toggle-auth">
                    已有账号？<a href="#" onclick="toggleAuth('login')">立即登录</a>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="appScreen" class="app-screen">
            <div class="header">
                <div class="header-content">
                    <div class="header-left">
                        <div class="header-logo">
                            <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="60" cy="60" r="50" stroke="url(#rainbow1)" stroke-width="12" fill="none" stroke-linecap="round"/>
                                <path d="M60 85 C60 85, 30 65, 30 45 C30 30, 45 25, 60 40" stroke="#e40303" stroke-width="10" stroke-linecap="round" fill="none"/>
                                <path d="M60 85 C60 85, 90 65, 90 45 C90 30, 75 25, 60 40" stroke="#ff8c00" stroke-width="10" stroke-linecap="round" fill="none"/>
                                <circle cx="60" cy="55" r="8" fill="url(#rainbow2)"/>
                                <defs>
                                    <linearGradient id="rainbow1" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#e40303"/>
                                        <stop offset="20%" style="stop-color:#ff8c00"/>
                                        <stop offset="40%" style="stop-color:#ffed00"/>
                                        <stop offset="60%" style="stop-color:#008026"/>
                                        <stop offset="80%" style="stop-color:#24408e"/>
                                        <stop offset="100%" style="stop-color:#732982"/>
                                    </linearGradient>
                                    <linearGradient id="rainbow2" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#ff8c00"/>
                                        <stop offset="50%" style="stop-color:#008026"/>
                                        <stop offset="100%" style="stop-color:#732982"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <h1>Alike</h1>
                    </div>
                    <button class="logout-btn" onclick="logout()">退出</button>
                </div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('nearby')">
                        <span class="tab-icon">🌍</span>附近
                    </button>
                    <button class="tab" onclick="switchTab('matches')">
                        <span class="tab-icon">💑</span>匹配
                    </button>
                    <button class="tab" onclick="switchTab('chats')">
                        <span class="tab-icon">💬</span>聊天
                    </button>
                </div>
            </div>

            <div class="content">
                <div id="nearbyContent"></div>
                <div id="matchesContent" class="hidden"></div>
                <div id="chatsContent" class="hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';
        let accessToken = localStorage.getItem('accessToken');

        if (accessToken) showApp();

        function toggleAuth(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            if (type === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerForm.style.animation = 'slideUp 0.3s ease-out';
            } else {
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
                loginForm.style.animation = 'slideUp 0.3s ease-out';
            }
        }

        async function login() {
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await response.json();

                if (data.success) {
                    accessToken = data.data.tokens.access_token;
                    localStorage.setItem('accessToken', accessToken);
                    showApp();
                } else {
                    showError(data.error?.message || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请检查API是否启动');
            }
        }

        async function register() {
            const phone = document.getElementById('registerPhone').value;
            const code = document.getElementById('registerCode').value;
            const nickname = document.getElementById('registerNickname').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, verification_code: code, nickname, password })
                });
                const data = await response.json();

                if (data.success) {
                    accessToken = data.data.tokens.access_token;
                    localStorage.setItem('accessToken', accessToken);
                    showApp();
                } else {
                    showError(data.error?.message || '注册失败');
                }
            } catch (error) {
                showError('网络错误');
            }
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            loadNearbyUsers();
        }

        function logout() {
            localStorage.removeItem('accessToken');
            location.reload();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');

            ['nearbyContent', 'matchesContent', 'chatsContent'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });

            const tabMap = {
                'nearby': 'nearbyContent',
                'matches': 'matchesContent',
                'chats': 'chatsContent'
            };

            document.getElementById(tabMap[tab]).classList.remove('hidden');

            if (tab === 'nearby') loadNearbyUsers();
            else if (tab === 'matches') loadMatches();
            else if (tab === 'chats') loadChats();
        }

        async function loadNearbyUsers() {
            const content = document.getElementById('nearbyContent');
            content.innerHTML = '<div class="loading">正在加载附近用户</div>';

            try {
                const response = await fetch(
                    `${API_BASE}/users/nearby?lat=31.2304&lng=121.4737&radius=10`,
                    { headers: { 'Authorization': `Bearer ${accessToken}` } }
                );
                const data = await response.json();

                if (data.success) {
                    displayUsers(data.data.users || [], content);
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误，请检查API是否启动<br><small>运行: go run cmd/api/main.go</small></div>';
            }
        }

        function displayUsers(users, container) {
            if (!users || users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🌈</div>
                        <div class="empty-state-text">暂无用户</div>
                        <div class="empty-state-sub">运行 ./scripts/setup-db.sh 导入测试数据</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = users.map((user, index) => `
                <div class="user-card" style="animation-delay: ${index * 0.1}s">
                    <div class="user-card-header">
                        <div class="avatar">${user.nickname ? user.nickname[0].toUpperCase() : '?'}</div>
                        <div class="user-info">
                            <h3>${user.nickname || 'Anonymous'}</h3>
                            <p>${user.bio || '这个人很懒，什么都没写'}</p>
                        </div>
                    </div>
                    ${user.bio ? `<div class="user-bio">${user.bio}</div>` : ''}
                    <div class="tags">
                        <span class="tag">🏳️‍🌈 社区</span>
                        <span class="tag">💬 在线</span>
                    </div>
                    <div class="actions">
                        <button class="action-btn like-btn" onclick="likeUser('${user.id}')">💖 喜欢</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadMatches() {
            const content = document.getElementById('matchesContent');
            content.innerHTML = '<div class="loading">正在加载匹配</div>';
            
            try {
                const response = await fetch(`${API_BASE}/matches`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();

                if (data.success) {
                    if (!data.data || data.data.length === 0) {
                        content.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">💑</div>
                                <div class="empty-state-text">暂无匹配</div>
                                <div class="empty-state-sub">喜欢更多用户来获得匹配</div>
                            </div>
                        `;
                    } else {
                        content.innerHTML = `
                            <div class="stats-card">
                                <div class="stats-icon">💑</div>
                                <div class="stats-number">${data.data.length}</div>
                                <div class="stats-label">个匹配</div>
                            </div>
                        `;
                    }
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误</div>';
            }
        }

        async function loadChats() {
            const content = document.getElementById('chatsContent');
            content.innerHTML = '<div class="loading">正在加载聊天</div>';
            
            try {
                const response = await fetch(`${API_BASE}/chats`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();

                if (data.success) {
                    if (!data.data || data.data.length === 0) {
                        content.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">💬</div>
                                <div class="empty-state-text">暂无聊天</div>
                                <div class="empty-state-sub">与匹配的人开始聊天吧</div>
                            </div>
                        `;
                    } else {
                        content.innerHTML = `
                            <div class="stats-card">
                                <div class="stats-icon">💬</div>
                                <div class="stats-number">${data.data.length}</div>
                                <div class="stats-label">个聊天</div>
                            </div>
                        `;
                    }
                } else {
                    content.innerHTML = `<div class="error">${data.error?.message || '加载失败'}</div>`;
                }
            } catch (error) {
                content.innerHTML = '<div class="error">网络错误</div>';
            }
        }

        async function likeUser(userId) {
            try {
                const response = await fetch(`${API_BASE}/matches/${userId}/like`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                data.success ? showSuccess('已发送喜欢！') : showError(data.error?.message || '操作失败');
            } catch (error) {
                showError('网络错误');
            }
        }

        function showError(message) {
            showNotification(message, 'error');
        }

        function showSuccess(message) {
            showNotification(message, 'success');
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = type;
            notification.textContent = message;
            notification.style.cssText = 'position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; animation: slideDown 0.3s ease-out;';
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease-out reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
