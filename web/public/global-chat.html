<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alike - 全局聊天室</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-50: #f5f3ff;
            --primary-100: #ede9fe;
            --primary-200: #ddd6fe;
            --primary-300: #c4b5fd;
            --primary-400: #a78bfa;
            --primary-500: #8b5cf6;
            --primary-600: #7c3aed;
            --primary-700: #6d28d9;
            
            --gradient-start: #a78bfa;
            --gradient-mid: #8b5cf6;
            --gradient-end: #7c3aed;
            
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #ddd6fe 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态背景 */
        .bg-gradient-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(at 40% 20%, hsla(258, 100%, 95%, 1) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189, 100%, 96%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(258, 100%, 94%, 1) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(340, 100%, 96%, 1) 0px, transparent 50%);
            background-size: 100% 100%;
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.1);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .room-info {
            margin-top: 12px;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
            border-radius: 12px;
            border-left: 4px solid var(--primary-400);
        }

        .room-info h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .room-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .online-count {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--primary-100);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-700);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .logout-btn {
            padding: 10px 18px;
            background: var(--primary-50);
            color: var(--primary-700);
            border: 2px solid var(--primary-200);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--primary-100);
            border-color: var(--primary-300);
            transform: translateY(-1px);
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.system {
            justify-content: center;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.system .message-content {
            background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
            color: var(--primary-700);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-username {
            font-weight: 700;
            font-size: 14px;
            color: var(--primary-700);
        }

        .message-time {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .message-text {
            background: var(--primary-50);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.own .message-text {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid));
            color: white;
        }

        .input-area {
            padding: 16px;
            background: rgba(255, 255, 255, 0.98);
            border-top: 1px solid var(--primary-100);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--primary-100);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            background: var(--primary-50);
            transition: all 0.3s;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--primary-500);
            background: white;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .send-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary-600);
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .typing-indicator {
            padding: 8px 16px;
            background: var(--primary-50);
            border-radius: 20px;
            font-size: 13px;
            color: var(--primary-700);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--primary-500);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <div class="bg-gradient-mesh"></div>

    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="header-logo">
                        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 24px; height: 24px;">
                            <circle cx="50" cy="50" r="42" stroke="white" stroke-width="6" fill="none"/>
                            <path d="M50 72 C50 72, 28 58, 28 42 C28 32, 38 28, 50 38" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
                            <path d="M50 72 C50 72, 72 58, 72 42 C72 32, 62 28, 50 38" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
                            <circle cx="50" cy="45" r="4" fill="white"/>
                        </svg>
                    </div>
                    <div>
                        <h1>Alike 全局聊天室</h1>
                        <div class="online-count">
                            <div class="online-dot"></div>
                            <span id="onlineCount">1,234</span> 人在线
                        </div>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
            <div class="room-info">
                <h2>🌈 Alike大家庭</h2>
                <p>欢迎来到Alike大家庭！这里是所有用户的聊天空间，认识新朋友，分享生活点滴。</p>
            </div>
        </div>

        <div class="chat-container">
            <div class="messages-area" id="messagesArea">
                <div class="loading">正在加载消息...</div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" class="message-input" id="messageInput" placeholder="输入消息..." maxlength="500" onkeypress="handleKeyPress(event)">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';
        let accessToken = localStorage.getItem('accessToken');
        let currentUsername = localStorage.getItem('username');
        let currentUserId = localStorage.getItem('userId');
        let refreshInterval = null;

        // 检查登录状态
        if (!accessToken) {
            window.location.href = '/index.html';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadMessages();
            startAutoRefresh();
            updateOnlineCount();
        });

        // 加载消息
        async function loadMessages() {
            const messagesArea = document.getElementById('messagesArea');
            
            try {
                const response = await fetch(`${API_BASE}/global/messages`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();

                if (data.success) {
                    displayMessages(data.data);
                } else {
                    messagesArea.innerHTML = `<div class="empty-state"><div class="empty-state-icon">💬</div><div>加载失败</div></div>`;
                }
            } catch (error) {
                messagesArea.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div>网络错误</div></div>`;
            }
        }

        // 显示消息
        function displayMessages(messages) {
            const messagesArea = document.getElementById('messagesArea');
            
            if (!messages || messages.length === 0) {
                messagesArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div>暂无消息</div>
                        <div style="font-size: 12px; margin-top: 8px;">成为第一个发言的人吧！</div>
                    </div>
                `;
                return;
            }

            // 按时间排序（旧的在上）
            messages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            messagesArea.innerHTML = messages.map(msg => {
                const isSystem = msg.user_id === 'system';
                const isOwn = msg.user_id === currentUserId;
                const time = formatTime(msg.created_at);
                
                if (isSystem) {
                    return `
                        <div class="message system">
                            <div class="message-content">${msg.content}</div>
                        </div>
                    `;
                }
                
                const avatar = msg.username ? msg.username[0].toUpperCase() : '?';
                
                return `
                    <div class="message ${isOwn ? 'own' : ''}">
                        <div class="message-avatar">${avatar}</div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-username">${msg.username}</span>
                                <span class="message-time">${time}</span>
                            </div>
                            <div class="message-text">${escapeHtml(msg.content)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // 滚动到底部
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            const content = input.value.trim();

            if (!content) return;

            btn.disabled = true;
            btn.textContent = '发送中...';

            try {
                const response = await fetch(`${API_BASE}/global/messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ content })
                });

                const data = await response.json();

                if (data.success) {
                    input.value = '';
                    loadMessages(); // 重新加载消息
                } else {
                    alert('发送失败：' + (data.error?.message || '未知错误'));
                }
            } catch (error) {
                alert('网络错误');
            } finally {
                btn.disabled = false;
                btn.textContent = '发送';
                input.focus();
            }
        }

        // 自动刷新
        function startAutoRefresh() {
            // 每3秒刷新一次消息
            refreshInterval = setInterval(() => {
                loadMessages();
            }, 3000);
        }

        // 更新在线人数
        function updateOnlineCount() {
            const countEl = document.getElementById('onlineCount');
            // 模拟在线人数
            const baseCount = 1200;
            const variation = Math.floor(Math.random() * 100);
            countEl.textContent = (baseCount + variation).toLocaleString();
        }

        // 格式化时间
        function formatTime(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) {
                return '刚刚';
            } else if (diff < 3600000) {
                return Math.floor(diff / 60000) + '分钟前';
            } else if (diff < 86400000) {
                return Math.floor(diff / 3600000) + '小时前';
            } else {
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 回车发送
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出吗？')) {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('username');
                localStorage.removeItem('userId');
                window.location.href = '/index.html';
            }
        }

        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</body>
</html>
