name: CI

# 防回归护栏：push 到 main / PR 时跑后端与前端的构建与测试。
# 已知缺口：前端 eslint 依赖未装（见架构审视），故 lint 暂不纳入门禁，待补齐后加入。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (build / vet / test -race)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum
      - name: Download modules
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (race + coverage)
        run: go test -race -covermode=atomic ./...

  frontend:
    name: Frontend (test / typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Prepare Nuxt
        run: npm run postinstall
      - name: Unit tests
        run: npm test
      - name: Typecheck
        # 已知 nuxt.config.ts 引用 process 需 @types/node，非阻断，失败不判红。
        run: npm run typecheck
        continue-on-error: true
