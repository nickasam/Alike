<svg xmlns="http://www.w3.org/2000/svg" width="480" height="128" viewBox="0 0 480 128" role="img" aria-label="Alike — 汇聚天下牛马">
  <defs>
    <linearGradient id="alikeBannerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="alikeBannerMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="alikeBannerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 图标 tile：56×56 -->
  <g filter="url(#alikeBannerGlow)">
    <rect x="24" y="36" width="56" height="56" rx="12" fill="url(#alikeBannerMark)"/>
    <!-- heart-handshake path，缩放并居中 -->
    <g transform="translate(52,64) scale(1.5) translate(-12,-12)">
      <path d="M12 20 4 12a4 4 0 0 1 6-6l2 2 2-2a4 4 0 0 1 6 6z"
            fill="none" stroke="#fff" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Alike wordmark -->
  <text x="98" y="72"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="40" font-weight="800" letter-spacing="-1"
        fill="url(#alikeBannerGrad)">Alike</text>

  <!-- 副标签 -->
  <text x="98" y="100"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="13" font-weight="500" letter-spacing="0.3"
        fill="#94a3b8">汇聚天下牛马 · 总有人懂你的辛苦</text>
</svg>
