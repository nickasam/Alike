worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # 上传体积上限（对齐文档：文档 ≤10MB，留余量）
    client_max_body_size 12m;

    # ---------- gzip ----------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ---------- 基本安全头 ----------
    add_header X-Frame-Options        "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ---------- 上游 ----------
    upstream alike_backend {
        server backend:8080;
        keepalive 32;
    }
    upstream alike_frontend {
        server frontend:3000;
        keepalive 32;
    }
    upstream alike_minio {
        server minio:9000;
        keepalive 32;
    }

    # WebSocket 升级映射：有 Upgrade 头则透传，否则 close
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # ---------- WebSocket → 后端（精确匹配，优先级高于 /api/）----------
        # 实际端点为 /api/ws；若落入下方 location /api/ 会清空 Connection 头导致
        # WebSocket 升级失败（握手 400）。此处用 "=" 精确匹配并透传 Upgrade 头。
        location = /api/ws {
            proxy_pass         http://alike_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Origin            $http_origin;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_buffering     off;
        }

        # ---------- REST API → 后端 ----------
        location /api/ {
            proxy_pass         http://alike_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # ---------- WebSocket 兼容旧路径 /ws（当前实际端点为 /api/ws，见上）----------
        location = /ws {
            proxy_pass         http://alike_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_buffering     off;
        }

        # ---------- 对象存储（头像/附件）→ MinIO ----------
        # bucket 已设为 anonymous download，浏览器经此路径读取上传对象。
        location /alike-uploads/ {
            proxy_pass         http://alike_minio;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   Connection      "";
            proxy_read_timeout 60s;
        }

        # ---------- 其余 → 前端（Nuxt SSR） ----------
        location / {
            proxy_pass         http://alike_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 60s;
        }
    }
}
